name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Cross-compile every agent binary and attach to the GitHub Release.
  agent-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false
      - name: Build binaries
        run: bash scripts/build-agent.sh "${GITHUB_REF_NAME#v}"
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent/dist/tokenwatch_*
            agent/dist/checksums.txt
          generate_release_notes: true

  # Build the web app with the version baked in and deploy the Worker.
  deploy-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Migrate + build + deploy (skipped if Cloudflare secrets absent)
        # The Cloudflare Vite plugin selects the environment at build time via
        # CLOUDFLARE_ENV — `wrangler deploy --env` is rejected on the redirected config.
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::Cloudflare secrets not set — skipping production deploy."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          npx wrangler d1 migrations apply tokenwatch --remote --env production
          CLOUDFLARE_ENV=production npm run build
          npx wrangler deploy --var WORKER_VERSION:"$VERSION"
